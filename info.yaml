# Tiny Tapeout project information
project:
  title:        "Solaris 4x4 int8 Systolic Array"
  author:       "ned"
  discord:      ""
  description:  "4x4 int8 output-stationary systolic array: a matrix multiply engine with byte-serial load and readout"
  language:     "Verilog"
  clock_hz:     40000000   # 25ns; measured slow-corner path is 21.88ns

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  # Measured, not estimated: a local LibreLane run reports 192,321 um2 of
  # standard cells for N=4 (pre-pipelining; the fetch-mux fix should reduce it).
  # Tile geometry is from tt-support-tools tech/sky130A/tile_sizes.yaml:
  #   3x2 =  508.76 x 225.76 = 114,858 um2   6 tiles  -- too small
  #   3x4 =  508.76 x 511.36 = 260,160 um2  12 tiles  -- 74% cells, near-square
  #   4x4 =  682.64 x 511.36 = 349,075 um2  16 tiles  -- fallback, 55% cells
  #   8x2 = 1378.16 x 225.76 = 311,113 um2  16 tiles  -- 6.1:1 strip, avoid
  # 3x4 over 8x2: fewer tiles AND square. This is a 4x4 mesh with nearest-
  # neighbour links; a 6:1 strip stretches it into a line and every local wire
  # becomes a long wire on sky130's 4 routable metal layers.
  tiles: "3x4"          # see tile_sizes.yaml for the full valid list

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_mainpath_solaris"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "solaris_array.v"
    - "tt_um_mainpath_solaris.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "DIN0"
  ui[1]: "DIN1"
  ui[2]: "DIN2"
  ui[3]: "DIN3"
  ui[4]: "DIN4"
  ui[5]: "DIN5"
  ui[6]: "DIN6"
  ui[7]: "DIN7"

  # Outputs
  uo[0]: "DOUT0"
  uo[1]: "DOUT1"
  uo[2]: "DOUT2"
  uo[3]: "DOUT3"
  uo[4]: "DOUT4"
  uo[5]: "DOUT5"
  uo[6]: "DOUT6"
  uo[7]: "DOUT7"

  # Bidirectional pins
  uio[0]: "BUSY out"
  uio[1]: "DONE out"
  uio[2]: "WR in"
  uio[3]: "START in"
  uio[4]: "RD in"
  uio[5]: "RST_PTR in"
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
